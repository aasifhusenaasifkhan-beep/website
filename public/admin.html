<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnimeSubStudio Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg: #0f0f0f; --panel: #1a1a1a; --primary: #e50914; --text: #ffffff; --border: #333; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--bg); color: var(--text); overflow-x: hidden; }
    
    #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 10000; }
    .login-box { background: var(--panel); padding: 40px; border-radius: 10px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
    .login-box h2 { color: var(--primary); margin-bottom: 20px; }
    .login-box input { width: 100%; padding: 12px; margin-bottom: 20px; background: #2b2b2b; border: none; color: white; border-radius: 5px; text-align: center; }
    .login-box button { background: var(--primary); color: white; width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;}

    .header { background: var(--panel); padding: 15px 20px; display: flex; align-items: center; border-bottom: 1px solid var(--border); }
    .menu-toggle { font-size: 24px; cursor: pointer; margin-right: 20px; color: var(--primary); }
    .site-name { font-size: 20px; font-weight: bold; }

    .sidebar { position: fixed; left: -280px; top: 0; height: 100%; width: 280px; background: var(--panel); z-index: 999; transition: 0.3s; padding-top: 80px; border-right: 1px solid var(--border); }
    .sidebar.open { left: 0; }
    .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); z-index: 998; }
    .sidebar-overlay.show { display: block; }
    .menu-item { display: flex; align-items: center; padding: 15px 25px; color: var(--text); cursor: pointer; font-size: 16px; transition: 0.2s; }
    .menu-item i { margin-right: 15px; width: 20px; text-align: center; color: var(--primary); }
    .menu-item:hover, .menu-item.active { background: #262626; }

    .main-content { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .section-card { background: var(--panel); padding: 30px; border-radius: 8px; border: 1px solid var(--border); display: none; }
    .section-card.active { display: block; }
    .section-card h3 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
    .form-control { width: 100%; padding: 12px; background: #252525; border: 1px solid var(--border); border-radius: 5px; color: white; font-size: 15px; }
    textarea.form-control { height: 100px; resize: none; }
    .btn-submit { background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }

    .search-container { position: relative; margin-bottom: 20px; }
    .search-container input { padding-left: 40px; }
    .search-container i { position: absolute; left: 15px; top: 15px; color: #777; }
    .scroll-list { max-height: 350px; overflow-y: auto; border: 1px solid var(--border); border-radius: 5px; background: #151515; }
    .list-item { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .delete-btn { background: #7c040a; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; }

    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1001; justify-content: center; align-items: center; padding: 20px; }
    .modal-box { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; width: 100%; max-width: 500px; padding: 30px; position: relative; }
    .close-modal { position: absolute; top: 15px; right: 15px; font-size: 20px; cursor: pointer; }
  </style>
</head>
<body>

  <div id="loginScreen">
    <div class="login-box">
      <h2>Admin Terminal</h2>
      <input type="password" id="adminPassInput" placeholder="Enter Secure Password">
      <button onclick="attemptLogin()">Access System</button>
    </div>
  </div>

  <div class="header">
    <span class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></span>
    <span class="site-name">AnimeSubStudio Dashboard</span>
  </div>

  <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

  <div class="sidebar" id="sidebar">
    <div class="menu-item active" onclick="switchSection('addPostSec')"><i class="fa-solid fa-plus"></i> Add Post (01)</div>
    <div class="menu-item" onclick="switchSection('selectPostSec')"><i class="fa-solid fa-magnifying-glass"></i> Select Post (02)</div>
    <div class="menu-item" onclick="switchSection('deletePostSec')"><i class="fa-solid fa-trash-can"></i> Delete System (03)</div>
    <div class="menu-item" onclick="switchSection('shortenersSec')"><i class="fa-solid fa-link"></i> Shorteners (04)</div>
    <div class="menu-item" onclick="switchSection('linksSec')"><i class="fa-solid fa-circle-nodes"></i> Channels (05)</div>
    <div class="menu-item" onclick="switchSection('premiumSec')"><i class="fa-solid fa-user-shield"></i> Premium Add (06)</div>
  </div>

  <div class="main-content">
    <div id="addPostSec" class="section-card active">
      <h3>Direct-To-Database Upload Post</h3>
      <form id="addPostForm" onsubmit="submitPost(event)">
        <div class="form-group">
          <label>Select Poster Image</label>
          <input type="file" id="postImage" class="form-control" accept="image/*" required>
        </div>
        <div class="form-group"><label>Post Name</label><input type="text" id="postName" class="form-control" required></div>
        <div class="form-group"><label>Release Date</label><input type="text" id="postRelease" class="form-control" required></div>
        <div class="form-group"><label>Genre</label><input type="text" id="postGenre" class="form-control" required></div>
        <div class="form-group"><label>Season</label><input type="text" id="postSeason" class="form-control" required></div>
        <div class="form-group"><label>Short Story</label><textarea id="postStory" class="form-control" required></textarea></div>
        <div class="form-group"><label>Category</label><input type="text" id="postCategory" class="form-control" required></div>
        <button type="submit" id="postSubmitBtn" class="btn-submit">Upload & Save Post</button>
      </form>
    </div>

    <div id="selectPostSec" class="section-card">
      <h3>Select Post to Add Episodes</h3>
      <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchPostInput" class="form-control" placeholder="Search Post Name..." oninput="fetchPostsForSelection()">
      </div>
      <div class="scroll-list" id="selectionList"></div>
    </div>

    <div id="deletePostSec" class="section-card">
      <h3>Delete Post & Episodes</h3>
      <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchDeleteInput" class="form-control" placeholder="Search Post..." oninput="fetchPostsForDeletion()">
      </div>
      <div class="scroll-list" id="deletionList"></div>
    </div>

    <div id="shortenersSec" class="section-card">
      <h3>Shortener Settings</h3>
      <div class="scroll-list" id="shortenerList" style="margin-bottom: 20px;"></div>
      <form onsubmit="submitShortener(event)">
        <div class="form-group"><input type="text" id="dashUrl" class="form-control" placeholder="Dashboard URL (e.g. gplinks.in)" required></div>
        <div class="form-group"><input type="text" id="apiKey" class="form-control" placeholder="API Key" required></div>
        <button type="submit" class="btn-submit">Add Shortener</button>
      </form>
    </div>

    <div id="linksSec" class="section-card">
      <h3>Telegram Links</h3>
      <form onsubmit="submitSettings(event)">
        <div class="form-group"><input type="url" id="chanLink" class="form-control" placeholder="Channel Link" required></div>
        <div class="form-group"><input type="url" id="groupLink" class="form-control" placeholder="Group Link" required></div>
        <button type="submit" class="btn-submit">Save Links</button>
      </form>
    </div>

    <div id="premiumSec" class="section-card">
      <h3>Add Premium User (28 Days)</h3>
      <form onsubmit="submitPremium(event)">
        <div class="form-group"><input type="text" id="premUser" class="form-control" placeholder="Username" required></div>
        <div class="form-group"><input type="text" id="premPass" class="form-control" placeholder="Password" required></div>
        <button type="submit" class="btn-submit">Generate User</button>
      </form>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-box">
      <span class="close-modal" onclick="closeModal()">&times;</span>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    let adminPass = localStorage.getItem("admin_password") || "";
    let supabaseClient = null;

    if (adminPass) {
      document.getElementById("loginScreen").style.display = "none";
      setupAdmin();
    }

    async function attemptLogin() {
      const pass = document.getElementById("adminPassInput").value;
      const res = await fetch("/api/admin/login", {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ password: pass })
      });
      const data = await res.json();
      if (data.success) {
        adminPass = pass;
        localStorage.setItem("admin_password", pass);
        document.getElementById("loginScreen").style.display = "none";
        supabaseClient = supabase.createClient(data.supabaseUrl, data.supabaseAnonKey);
        loadInitialData();
      } else { alert(data.error); }
    }

    async function setupAdmin() {
      const res = await fetch("/api/admin/login", {
        method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ password: adminPass })
      });
      const data = await res.json();
      if(data.success) {
        supabaseClient = supabase.createClient(data.supabaseUrl, data.supabaseAnonKey);
        loadInitialData();
      } else {
        localStorage.removeItem("admin_password");
        location.reload();
      }
    }

    function loadInitialData() {
      fetchPostsForSelection(); fetchPostsForDeletion(); fetchShorteners(); fetchSettings();
    }

    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("open");
      document.getElementById("overlay").classList.toggle("show");
    }

    function switchSection(secId) {
      document.querySelectorAll(".section-card").forEach(el => el.classList.remove("active"));
      document.querySelectorAll(".menu-item").forEach(el => el.classList.remove("active"));
      document.getElementById(secId).classList.add("active");
      const activeIdx = Array.from(document.getElementById("sidebar").children).findIndex(el => el.getAttribute('onclick').includes(secId));
      if(activeIdx !== -1) document.getElementById("sidebar").children[activeIdx].classList.add("active");
      toggleSidebar();
    }

    async function makeReq(url, method="GET", body=null) {
      const options = { method, headers: { "Authorization": adminPass, "Content-Type": "application/json" } };
      if(body) options.body = JSON.stringify(body);
      const res = await fetch(url, options);
      if(res.status === 401) { alert("Session Expired!"); localStorage.clear(); location.reload(); }
      return res.json();
    }

    // DIRECT-TO-SUPABASE UPLOAD LOGIC
    async function submitPost(e) {
      e.preventDefault();
      const btn = document.getElementById("postSubmitBtn");
      btn.innerText = "Uploading to Database..."; btn.disabled = true;

      try {
        const file = document.getElementById("postImage").files[0];
        const fileName = `${Date.now()}-${file.name}`;
        
        const { error: uploadError } = await supabaseClient.storage.from("Post-images").upload(fileName, file);
        if (uploadError) throw new Error("Image Upload Failed: " + uploadError.message);
        
        const { data: urlData } = supabaseClient.storage.from("Post-images").getPublicUrl(fileName);
        
        const postData = {
          name: document.getElementById("postName").value.trim(),
          image_url: urlData.publicUrl,
          release_date: document.getElementById("postRelease").value.trim(),
          genres: document.getElementById("postGenre").value.trim(),
          season: document.getElementById("postSeason").value.trim(),
          short_story: document.getElementById("postStory").value.trim(),
          category: document.getElementById("postCategory").value.trim()
        };

        const res = await makeReq("/api/admin/add-post", "POST", postData);
        if (res.success) {
          alert("Post successfully live!");
          document.getElementById("addPostForm").reset();
          loadInitialData();
        } else throw new Error(res.error);

      } catch (err) {
        alert(err.message);
      } finally {
        btn.innerText = "Upload & Save Post"; btn.disabled = false;
      }
    }

    async function fetchPostsForSelection() {
      const search = document.getElementById("searchPostInput").value;
      const data = await makeReq(`/api/admin/posts?search=${encodeURIComponent(search)}`);
      document.getElementById("selectionList").innerHTML = data.map(post => `
        <div class="list-item" onclick="openEpisodeModal('${post.id}', '${post.name}')">
          <span>${post.name}</span><i class="fa-solid fa-circle-arrow-right" style="color: var(--primary);"></i>
        </div>`).join("");
    }

    function openEpisodeModal(postId, postName) {
      document.getElementById("modalContent").innerHTML = `
        <h3 style="margin-bottom: 20px;">Manage Episodes for "${postName}"</h3>
        <form onsubmit="submitEpisode(event, '${postId}')">
          <div class="form-group"><label>Episode Number</label><input type="text" id="epNum" class="form-control" placeholder="e.g. 01" required></div>
          <div class="form-group">
            <label>Quality Tag</label>
            <select id="epQuality" class="form-control">
              <option value="">Normal (No Tag)</option>
              <option value="FHD">FHD (1080p)</option>
              <option value="HD">HD (720p)</option>
              <option value="SD">SD (480p)</option>
            </select>
          </div>
          <div class="form-group"><label>Download Link</label><input type="url" id="epLink" class="form-control" required></div>
          <button type="submit" class="btn-submit">Save Episode</button>
        </form>
      `;
      document.getElementById("modal").style.display = "flex";
    }

    async function submitEpisode(e, postId) {
      e.preventDefault();
      const num = document.getElementById("epNum").value.trim();
      const numPrefix = isNaN(num) ? num : "EPISODE " + String(num).padStart(2, '0');
      const quality = document.getElementById("epQuality").value;
      const finalLabel = quality ? `${numPrefix} [${quality}]` : numPrefix;

      const res = await makeReq("/api/admin/add-episode", "POST", { 
        post_id: postId, episode_label: finalLabel, original_link: document.getElementById("epLink").value.trim() 
      });
      if (res.success) { alert("Episode Saved!"); closeModal(); } 
      else { alert(res.error); }
    }

    async function fetchPostsForDeletion() {
      const search = document.getElementById("searchDeleteInput").value;
      const data = await makeReq(`/api/admin/posts?search=${encodeURIComponent(search)}`);
      document.getElementById("deletionList").innerHTML = data.map(post => `
        <div class="list-item" onclick="openDeleteModal('${post.id}', '${post.name}')">
          <span>${post.name}</span><span style="color: #777; font-size:13px;">Manage <i class="fa-solid fa-chevron-right"></i></span>
        </div>`).join("");
    }

    async function openDeleteModal(postId, postName) {
      document.getElementById("modalContent").innerHTML = `
        <h3 style="margin-bottom: 10px;">Delete: ${postName}</h3>
        <button class="delete-btn" style="width: 100%; padding: 10px; margin-bottom: 20px;" onclick="deleteFullPost('${postId}')">DELETE FULL POST</button>
        <h4>Episodes:</h4>
        <div class="scroll-list" id="epListToDelete" style="margin-top:10px; max-height:200px;">Loading...</div>
      `;
      document.getElementById("modal").style.display = "flex";
      const episodes = await makeReq(`/api/admin/episodes/${postId}`);
      document.getElementById("epListToDelete").innerHTML = episodes.map(ep => `
        <div class="list-item" style="padding:10px;"><span>${ep.episode_label}</span><button class="delete-btn" onclick="deleteSingleEpisode('${ep.id}')">Del</button></div>
      `).join("") || "<div style='padding:15px;'>No episodes.</div>";
    }

    async function deleteFullPost(postId) {
      if (confirm("Poori Post aur Episodes delete ho jayenge. Confirm?")) {
        await makeReq("/api/admin/delete-post", "POST", { post_id: postId }); closeModal(); loadInitialData();
      }
    }
    async function deleteSingleEpisode(epId) {
      if (confirm("Episode delete karein?")) {
        await makeReq("/api/admin/delete-episode", "POST", { episode_id: epId }); closeModal();
      }
    }

    async function fetchShorteners() {
      const data = await makeReq("/api/admin/shorteners");
      document.getElementById("shortenerList").innerHTML = data.map((sh, idx) => `
        <div class="list-item"><div><strong>Shortener 0${idx+1}</strong><br><small>${sh.dashboard_url}</small></div><button class="delete-btn" onclick="deleteShortener('${sh.id}')">Del</button></div>
      `).join("") || "<div style='padding:15px;'>No shorteners configured.</div>";
    }
    async function submitShortener(e) {
      e.preventDefault();
      const res = await makeReq("/api/admin/add-shortener", "POST", { dashboard_url: document.getElementById("dashUrl").value, api_key: document.getElementById("apiKey").value });
      if(res.success) { alert("Added!"); e.target.reset(); fetchShorteners(); } else alert(res.error);
    }
    async function deleteShortener(id) { await makeReq("/api/admin/delete-shortener", "POST", { id }); fetchShorteners(); }

    async function fetchSettings() {
      const data = await makeReq("/api/admin/settings");
      document.getElementById("chanLink").value = data.channel_link || ""; document.getElementById("groupLink").value = data.group_link || "";
    }
    async function submitSettings(e) {
      e.preventDefault();
      await makeReq("/api/admin/save-settings", "POST", { channel_link: document.getElementById("chanLink").value, group_link: document.getElementById("groupLink").value });
      alert("Settings Saved!");
    }
    async function submitPremium(e) {
      e.preventDefault();
      const res = await makeReq("/api/admin/add-premium", "POST", { username: document.getElementById("premUser").value, password: document.getElementById("premPass").value });
      if (res.success) { alert("User Created! Expires in 28 Days."); e.target.reset(); }
    }
    function closeModal() { document.getElementById("modal").style.display = "none"; }
  </script>
</body>
</html>
