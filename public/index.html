<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AnimeSubStudio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --bg: #0f0f0f; --primary: #e50914; --text: #fff; --border: #333; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: var(--bg); color: var(--text); overflow-x: hidden; }
    
    /* Glassmorphism Header */
    .header { background: rgba(26, 26, 26, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
    .header .logo { font-size: 22px; font-weight: bold; color: var(--primary); cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
    .search-bar { flex: 1; margin: 0 20px; max-width: 500px; position: relative; }
    .search-bar input { width: 100%; padding: 10px 40px 10px 20px; border: none; border-radius: 20px; background: rgba(51, 51, 51, 0.8); color: white; font-size: 14px; }
    .search-bar i { position: absolute; right: 15px; top: 12px; color: #aaa; }
    .menu-btn { font-size: 24px; cursor: pointer; color: var(--primary); }

    .sidebar { position: fixed; right: -280px; top: 0; width: 280px; height: 100%; background: #1a1a1a; padding: 30px 20px; transition: right 0.3s ease-in-out; z-index: 1000; overflow-y: auto; border-left: 1px solid var(--border); }
    .sidebar.open { right: 0; }
    .sidebar h3 { font-size: 20px; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
    .sidebar a { display: block; color: white; padding: 12px 15px; text-decoration: none; margin: 5px 0; border-radius: 5px; font-size: 16px; font-weight: bold; }
    .sidebar a:hover { background: #333; color: var(--primary); }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; display: none; }
    .overlay.show { display: block; }

    .section-title { padding: 20px 20px 0 20px; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); }
    .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; padding: 20px; }
    .post-card { background: #1a1a1a; border-radius: 8px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid var(--border); transition: transform 0.2s; }
    .post-card:hover { transform: scale(1.03); }
    .post-card img { width: 100%; height: 210px; object-fit: cover; }
    .post-card .category-tag { position: absolute; top: 8px; right: 8px; background: var(--primary); color: white; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
    .post-card .name { padding: 10px; font-size: 14px; text-align: center; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .detail-page { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
    .detail-page.active { display: block; }
    .back-btn { background: none; color: var(--primary); border: none; font-size: 18px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
    .detail-header { display: flex; gap: 30px; flex-wrap: wrap; margin-bottom: 30px; }
    .detail-header img { width: 220px; border-radius: 8px; border: 1px solid var(--border); }
    .detail-info { flex: 1; min-width: 280px; }
    .detail-info h2 { font-size: 28px; margin-bottom: 15px; color: var(--primary); }
    .detail-info p { margin-bottom: 10px; font-size: 15px; line-height: 1.5; color: #ccc; }
    .detail-info p strong { color: white; }
    
    .episodes { margin-top: 30px; background: #151515; padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
    .episodes h3 { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; font-size: 18px; }
    .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    .episodes button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; }
    .episodes button:hover { background: #b8070e; }

    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
    .modal.active { display: flex; }
    .modal-box { background: #1a1a1a; border: 1px solid var(--border); padding: 30px; border-radius: 8px; text-align: center; width: 100%; max-width: 400px; position: relative; }
    .modal-box h3 { margin-bottom: 20px; color: var(--primary); }
    .modal-box input { width: 100%; padding: 12px; margin-bottom: 15px; background: #252525; border: 1px solid var(--border); color: white; border-radius: 5px; text-align: center; font-size: 15px; }
    .modal-box button { background: var(--primary); color: white; padding: 12px 24px; border: none; border-radius: 5px; margin: 8px 0; cursor: pointer; font-weight: bold; font-size: 14px; width: 100%; }
    .close-modal { position: absolute; top: 15px; right: 15px; font-size: 20px; cursor: pointer; color: #777; }
  </style>
</head>
<body>

  <div class="header">
    <span class="logo" onclick="showHome()">AnimeSubStudio</span>
    <div class="search-bar"><input type="text" id="searchInput" placeholder="Search Anime or Genre..." oninput="searchPosts()"><i class="fa-solid fa-magnifying-glass"></i></div>
    <span class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-ellipsis-vertical"></i></span>
  </div>

  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <h3>Filters & Categories</h3>
    <a href="#" onclick="showAllPosts()">All Posts</a>
    <a href="#" onclick="showSidebarSection('category')">Categories</a>
    <a href="#" onclick="showSidebarSection('genre')">Genres</a>
    <a href="#" onclick="showSidebarSection('az')">A-Z Directory</a>
    <a href="#" id="tgChannel" target="_blank">Channel Link</a>
    <a href="#" id="tgGroup" target="_blank">Group Link</a>
  </div>

  <div id="mainContent">
    <h2 class="section-title" id="gridTitle">Recently Added</h2>
    <div id="postsGrid" class="posts-grid"></div>
    
    <div id="detailPage" class="detail-page">
      <button class="back-btn" onclick="showHome()"><i class="fa-solid fa-arrow-left"></i> Back to Home</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-box" id="modalContent"></div>
  </div>

  <script>
    let allPosts = [];

    async function loadApp() {
      const postsRes = await fetch("/api/public/posts");
      allPosts = await postsRes.json();
      renderPosts(allPosts);
      
      const setRes = await fetch("/api/public/settings");
      const settings = await setRes.json();
      document.getElementById("tgChannel").href = settings.channel_link || "#";
      document.getElementById("tgGroup").href = settings.group_link || "#";
    }

    function renderPosts(posts) {
      const grid = document.getElementById("postsGrid");
      if(posts.length === 0) {
        grid.innerHTML = "<div style='grid-column: 1/-1; text-align:center; padding:50px 0; color:#777;'>No posts found.</div>";
        return;
      }
      grid.innerHTML = posts.map(p => `
        <div class="post-card" onclick="showDetail('${p.id}')">
          <img src="${p.image_url}" alt="${p.name}">
          <span class="category-tag">${p.category}</span>
          <div class="name">${p.name}</div>
        </div>`).join("");
    }

    async function showDetail(postId) {
      const post = allPosts.find(p => p.id === postId);
      if (!post) return;
      
      document.getElementById("postsGrid").style.display = "none";
      document.getElementById("gridTitle").style.display = "none";
      document.getElementById("detailPage").classList.add("active");
      
      // Fetch episodes (original_link is hidden by API)
      const epRes = await fetch(`/api/public/episodes/${postId}`);
      const episodes = await epRes.json();
      
      const normalizedGenres = (post.genres || "").replace(/[,;\-_]/g, ' ').split(/\s+/).filter(Boolean).join(", ");
      
      document.getElementById("detailContent").innerHTML = `
        <div class="detail-header">
          <img src="${post.image_url}" alt="${post.name}">
          <div class="detail-info">
            <h2>${post.name}</h2>
            <p><strong>Genre:</strong> ${normalizedGenres || "N/A"}</p>
            <p><strong>Release Date:</strong> ${post.release_date || "N/A"}</p>
            <p><strong>Season:</strong> ${post.season || "N/A"}</p>
            <p><strong>Story:</strong> ${post.short_story || "N/A"}</p>
          </div>
        </div>
        <div class="episodes">
          <h3>EPISODES LIST</h3>
          <div class="episodes-grid">
            ${episodes.map(ep => `<button onclick="handleEpisode('${post.name}', '${ep.episode_label}', '${ep.id}')">${ep.episode_label}</button>`).join("")}
          </div>
        </div>
      `;
    }

    function handleEpisode(postName, epLabel, epId) {
      showModal(`
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h3>${postName}</h3>
        <p style="margin-bottom:20px; font-weight:bold;">${epLabel}</p>
        <button onclick="solveShortener('${epId}')">Download via Shortener</button>
        <button style="background:#0066cc;" onclick="openPremiumLogin('${epId}')">Premium Login (Direct File)</button>
      `);
    }

    async function solveShortener(epId) {
      showModal(`<h3>Processing...</h3><p>Generating bypass key link, please wait.</p>`);
      try {
        const res = await fetch(`/api/public/shorten?ep_id=${epId}`);
        const data = await res.json();
        if (data.shortLink) { window.open(data.shortLink, "_blank"); closeModal(); } 
        else { alert("Error: " + data.error); closeModal(); }
      } catch (e) { alert("Server error"); closeModal(); }
    }

    function openPremiumLogin(epId) {
      showModal(`
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h3>Premium Authentication</h3>
        <input type="text" id="pUser" placeholder="Enter Username">
        <input type="password" id="pPass" placeholder="Enter Password">
        <button onclick="verifyPremium('${epId}')">Verify & Access</button>
      `);
    }

    async function verifyPremium(epId) {
      const username = document.getElementById("pUser").value;
      const password = document.getElementById("pPass").value;
      try {
        const res = await fetch("/api/public/premium-login", {
          method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username, password, ep_id: epId })
        });
        const data = await res.json();
        if (data.success) { window.open(data.original_link, "_blank"); closeModal(); } 
        else { alert(data.error || "Premium Check Failed!"); }
      } catch (e) { alert("System error"); }
    }

    function showModal(html) { document.getElementById("modalContent").innerHTML = html; document.getElementById("modal").classList.add("active"); }
    function closeModal() { document.getElementById("modal").classList.remove("active"); }
    function showHome() { document.getElementById("postsGrid").style.display = ""; document.getElementById("gridTitle").style.display = ""; document.getElementById("gridTitle").innerText = "Recently Added"; document.getElementById("detailPage").classList.remove("active"); renderPosts(allPosts); }
    
    function searchPosts() {
      const term = document.getElementById("searchInput").value.toLowerCase();
      renderPosts(allPosts.filter(p => p.name.toLowerCase().includes(term) || (p.genres || "").toLowerCase().includes(term)));
    }

    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("open"); document.getElementById("overlay").classList.toggle("show"); }
    function showSidebarSection(type) {
      toggleSidebar();
      if (type === "category") {
        const categories = [...new Set(allPosts.map(p => p.category).filter(Boolean))];
        showModal(`<span class="close-modal" onclick="closeModal()">&times;</span><h3>Categories</h3><div style="display:flex; flex-direction:column; gap:10px;">${categories.map(c => `<button onclick="closeModal(); document.getElementById('gridTitle').innerText='${c}'; renderPosts(allPosts.filter(p=>p.category==='${c}'))">${c}</button>`).join("")}</div>`);
      } else if (type === "genre") {
        const genres = [...new Set(allPosts.flatMap(p => (p.genres || "").replace(/[,;\-_]/g, ' ').split(/\s+/).filter(Boolean)))];
        showModal(`<span class="close-modal" onclick="closeModal()">&times;</span><h3>Genres</h3><div style="display:flex; flex-direction:column; gap:10px; max-height:300px; overflow-y:auto;">${genres.map(g => `<button onclick="closeModal(); document.getElementById('gridTitle').innerText='Genre: ${g}'; renderPosts(allPosts.filter(p=>p.genres.includes('${g}')))">${g}</button>`).join("")}</div>`);
      } else if (type === "az") {
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789".split("");
        showModal(`<span class="close-modal" onclick="closeModal()">&times;</span><h3>A-Z Directory</h3><div style="display:grid; grid-template-columns: repeat(6, 1fr); gap:8px;">${letters.map(l => `<button style="padding:8px 0;" onclick="closeModal(); document.getElementById('gridTitle').innerText='Letter: ${l}'; renderPosts(allPosts.filter(p=>p.name.toUpperCase().startsWith('${l}')))">${l}</button>`).join("")}</div>`);
      }
    }
    function showAllPosts() { toggleSidebar(); showHome(); }

    window.onload = loadApp;
  </script>
</body>
</html>
