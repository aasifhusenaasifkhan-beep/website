<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AnimeSubStudio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { 
      --bg: #09090c; 
      --header: rgba(18, 18, 24, 0.85); 
      --primary: #ff1e27; 
      --primary-hover: #e50914; 
      --text: #f5f5f7; 
      --border: #22222d; 
      --card-bg: #13131a;
      --accent-glow: rgba(255, 30, 39, 0.2);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
    body { background: var(--bg); color: var(--text); overflow-x: hidden; }
    
    /* Header blur styling */
    .header { 
      background: var(--header); 
      padding: 15px 25px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      position: sticky; 
      top: 0; 
      z-index: 900; 
      border-bottom: 1px solid var(--border); 
      backdrop-filter: blur(12px);
    }
    .header .logo { 
      font-size: 24px; 
      font-weight: 900; 
      color: var(--primary); 
      cursor: pointer; 
      text-transform: uppercase; 
      letter-spacing: 1.5px; 
      text-shadow: 0 0 15px var(--accent-glow);
    }
    .search-bar { flex: 1; margin: 0 30px; max-width: 550px; position: relative; }
    .search-bar input { 
      width: 100%; 
      padding: 12px 45px 12px 20px; 
      border: 1px solid var(--border); 
      border-radius: 30px; 
      background: #14141e; 
      color: white; 
      font-size: 15px; 
      outline: none;
      transition: 0.2s;
    }
    .search-bar input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 10px var(--accent-glow);
    }
    .search-bar i { position: absolute; right: 20px; top: 15px; color: #777; }
    .menu-btn { font-size: 26px; cursor: pointer; color: var(--primary); transition: 0.2s; }
    .menu-btn:hover { transform: scale(1.1); }

    /* Sidebar filters */
    .sidebar { 
      position: fixed; 
      right: -290px; 
      top: 0; 
      width: 290px; 
      height: 100%; 
      background: #111118; 
      padding: 40px 25px; 
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
      z-index: 1000; 
      overflow-y: auto; 
      border-left: 1px solid var(--border); 
    }
    .sidebar.open { right: 0; }
    .sidebar h3 { font-size: 22px; color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 12px; margin-bottom: 20px; font-weight: 800; letter-spacing: 0.5px; }
    .sidebar a { display: block; color: #ccc; padding: 14px 18px; text-decoration: none; margin: 8px 0; border-radius: 8px; font-size: 16px; font-weight: 600; transition: 0.2s; background: #161622; }
    .sidebar a:hover { background: var(--primary); color: white; box-shadow: 0 4px 12px var(--accent-glow); }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; display: none; backdrop-filter: blur(4px); }
    .overlay.show { display: block; }

    /* Home grid view colors */
    .section-title { padding: 30px 25px 5px 25px; font-size: 24px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; color: #fff; border-left: 5px solid var(--primary); margin-left: 25px; margin-top: 15px; }
    .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 25px; padding: 25px; }
    .post-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid var(--border); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .post-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 8px 24px var(--accent-glow); }
    .post-card img { width: 100%; height: 235px; object-fit: cover; }
    .post-card .category-tag { position: absolute; top: 10px; right: 10px; background: var(--primary); color: white; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    .post-card .name { padding: 12px; font-size: 14px; text-align: center; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #f5f5f7; }

    /* Details page view styles */
    .detail-page { display: none; padding: 30px 25px; max-width: 950px; margin: 0 auto; animation: fadeIn 0.4s ease-out; }
    .detail-page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .back-btn { background: #161622; color: var(--primary); border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 25px; font-weight: bold; transition: 0.2s; }
    .back-btn:hover { background: var(--primary); color: white; }
    .detail-header { display: flex; gap: 35px; flex-wrap: wrap; margin-bottom: 35px; }
    .detail-header img { width: 250px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 8px 30px rgba(0,0,0,0.6); }
    .detail-info { flex: 1; min-width: 300px; }
    .detail-info h2 { font-size: 34px; margin-bottom: 20px; color: #fff; font-weight: 800; }
    .detail-info p { margin-bottom: 12px; font-size: 16px; line-height: 1.6; color: #b5b5c0; }
    .detail-info p strong { color: #fff; text-transform: uppercase; font-size: 14px; letter-spacing: 0.5px; margin-right: 5px; }
    
    /* Episodes tag layouts */
    .episodes { margin-top: 35px; background: #0e0e14; padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
    .episodes h3 { border-bottom: 2px solid var(--border); padding-bottom: 12px; margin-bottom: 20px; font-size: 20px; font-weight: 800; color: #fff; }
    .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 14px; }
    .episodes button { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .episodes button:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 4px 12px var(--accent-glow); }

    /* Modal dialog */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 2000; padding: 20px; backdrop-filter: blur(5px); }
    .modal.active { display: flex; }
    .modal-box { background: #121218; border: 1px solid var(--border); padding: 35px; border-radius: 12px; text-align: center; width: 100%; max-width: 420px; position: relative; box-shadow: 0 8px 32px rgba(0,0,0,0.8); }
    .modal-box h3 { margin-bottom: 15px; color: #fff; font-size: 22px; font-weight: 800; }
    .modal-box input { width: 100%; padding: 14px; margin-bottom: 15px; background: #1a1a24; border: 1px solid var(--border); color: white; border-radius: 8px; text-align: center; font-size: 16px; outline: none; }
    .modal-box button { background: var(--primary); color: white; padding: 14px 20px; border: none; border-radius: 8px; margin: 8px 0; cursor: pointer; font-weight: bold; font-size: 15px; width: 100%; transition: 0.2s; text-transform: uppercase; }
    .modal-box button:hover { background: var(--primary-hover); }
    .close-modal { position: absolute; top: 15px; right: 18px; font-size: 24px; cursor: pointer; color: #777; transition: 0.2s; }
    .close-modal:hover { color: var(--primary); }
  </style>
</head>
<body>

  <!-- Top Header bar -->
  <div class="header">
    <span class="logo" onclick="showHome()">AnimeSubStudio</span>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by name or genre..." oninput="searchPosts()">
      <i class="fa-solid fa-magnifying-glass"></i>
    </div>
    <span class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-ellipsis-vertical"></i></span>
  </div>

  <!-- Sidebar drawers and dark screen blur overlay -->
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <h3>Filters Menu</h3>
    <a href="#" onclick="showAllPosts()">All Posts</a>
    <a href="#" onclick="showSidebarSection('category')">Categories</a>
    <a href="#" onclick="showSidebarSection('genre')">Genres</a>
    <a href="#" onclick="showSidebarSection('az')">A2Z 0-9</a>
    <a href="#" id="tgChannel" target="_blank">Channel Link</a>
    <a href="#" id="tgGroup" target="_blank">Group Link</a>
  </div>

  <!-- Content Workspace -->
  <div id="mainContent">
    <h2 class="section-title" id="gridTitle">All Posts</h2>
    <div id="postsGrid" class="posts-grid"></div>
    
    <!-- Detail view layout -->
    <div id="detailPage" class="detail-page">
      <button class="back-btn" onclick="showHome()"><i class="fa-solid fa-arrow-left"></i> Wapas Jayein</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- Modal components -->
  <div class="modal" id="modal">
    <div class="modal-box" id="modalContent"></div>
  </div>

  <script>
    let allPosts = [];
    let settings = {};

    async function loadApp() {
      try {
        const postsRes = await fetch("/api/admin/posts");
        allPosts = await postsRes.json();
        renderPosts(allPosts);

        const setRes = await fetch("/api/admin/settings");
        settings = await setRes.json();
        document.getElementById("tgChannel").href = settings.channel_link || "#";
        document.getElementById("tgGroup").href = settings.group_link || "#";
      } catch (err) {
        console.error("App initialization failed: ", err);
      }
    }

    function renderPosts(posts) {
      const grid = document.getElementById("postsGrid");
      if(!posts || posts.length === 0) {
        grid.innerHTML = "<div style='grid-column: 1/-1; text-align:center; padding:50px 0; color:#555; font-size:16px; font-weight:bold;'>Koi post nahi mili.</div>";
        return;
      }
      grid.innerHTML = posts.map(p => `
        <div class="post-card" onclick="showDetail('${p.id}')">
          <img src="${p.image_url}" alt="${p.name}">
          <span class="category-tag">${p.category}</span>
          <div class="name">${p.name}</div>
        </div>
      `).join("");
    }

    async function showDetail(postId) {
      const post = allPosts.find(p => p.id === postId);
      if (!post) return;
      
      document.getElementById("postsGrid").style.display = "none";
      document.getElementById("gridTitle").style.display = "none";
      document.getElementById("detailPage").classList.add("active");
      
      const epRes = await fetch(`/api/admin/episodes/${postId}`);
      const episodes = await epRes.json();
      
      const normalizedGenres = parseGenres(post.genres).join(", ");
      
      document.getElementById("detailContent").innerHTML = `
        <div class="detail-header">
          <img src="${post.image_url}" alt="${post.name}">
          <div class="detail-info">
            <h2>${post.name}</h2>
            <p><strong>Genre:</strong> ${normalizedGenres || "N/A"}</p>
            <p><strong>Release Date:</strong> ${post.release_date || "N/A"}</p>
            <p><strong>Season:</strong> ${post.season || "N/A"}</p>
            <p><strong>Story:</strong> ${post.short_story || "N/A"}</p>
          </div>
        </div>
        <div class="episodes">
          <h3>EPISODE LIST</h3>
          <div class="episodes-grid">
            ${episodes.map(ep => `
              <button onclick="handleEpisode('${post.name}', '${ep.episode_label}')">${ep.episode_label}</button>
            `).join("")}
          </div>
        </div>
      `;
    }

    function parseGenres(genreStr) {
      if (!genreStr) return [];
      return genreStr.replace(/[,;\-_]/g, ' ').split(/\s+/).map(g => g.trim()).filter(Boolean);
    }

    function handleEpisode(postName, epLabel) {
      showModal(`
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h3 style="color:var(--primary); font-size:22px; font-weight:800; margin-bottom:8px;">${postName}</h3>
        <p style="margin-bottom:25px; font-weight:700; color:#aaa; font-size:15px;">${epLabel}</p>
        <button onclick="solveShortener('${postName}', '${epLabel}')">Solve Shortener (Free Direct)</button>
        <button style="background:#0066cc;" onclick="openPremiumLogin('${postName}', '${epLabel}')">Premium Direct Bypass Login</button>
      `);
    }

    async function solveShortener(postName, epLabel) {
      showModal(`<h3>Processing...</h3><p style="color:#aaa; font-size:14px; margin-top:10px;">Generating dynamic bypass link, please wait...</p>`);
      try {
        const res = await fetch(`/api/shorten?post_name=${encodeURIComponent(postName)}&ep_label=${encodeURIComponent(epLabel)}`);
        const data = await res.json();
        if (data && data.shortLink) {
          window.open(data.shortLink, "_blank");
          closeModal();
        } else {
          alert("Error generating shortlink: " + (data ? data.error : "Unknown backend limits"));
          closeModal();
        }
      } catch (e) {
        alert("Bypass server connection limits: " + e.message);
        closeModal();
      }
    }

    function openPremiumLogin(postName, epLabel) {
      showModal(`
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h3 style="margin-bottom:15px; font-weight:800;">Premium Access Portal</h3>
        <input type="text" id="pUser" placeholder="Enter Username">
        <input type="password" id="pPass" placeholder="Enter Password">
        <button onclick="verifyPremium('${postName}', '${epLabel}')">Authenticate & Access</button>
      `);
    }

    async function verifyPremium(postName, epLabel) {
      const username = document.getElementById("pUser").value;
      const password = document.getElementById("pPass").value;

      try {
        const res = await fetch("/api/premium-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password, post_name: postName, ep_label: epLabel })
        });
        const data = await res.json();
        if (res.ok && data.success && data.original_link) {
          window.open(data.original_link, "_blank");
          closeModal();
        } else {
          alert(data.error || "Premium verification failed!");
        }
      } catch (e) {
        alert("Authentication interface system down: " + e.message);
      }
    }

    function showModal(html) {
      const modal = document.getElementById("modal");
      document.getElementById("modalContent").innerHTML = html;
      modal.classList.add("active");
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("active");
    }

    function showHome() {
      document.getElementById("postsGrid").style.display = "";
      document.getElementById("gridTitle").style.display = "";
      document.getElementById("gridTitle").innerText = "All Posts";
      document.getElementById("detailPage").classList.remove("active");
      renderPosts(allPosts);
    }

    function searchPosts() {
      const term = document.getElementById("searchInput").value.toLowerCase();
      const filtered = allPosts.filter(p => {
        const matchName = p.name.toLowerCase().includes(term);
        const matchGenre = parseGenres(p.genres).some(g => g.toLowerCase().includes(term));
        return matchName || matchGenre;
      });
      renderPosts(filtered);
    }

    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("open");
      document.getElementById("overlay").classList.toggle("show");
    }

    function showSidebarSection(type) {
      toggleSidebar();
      if (type === "category") {
        const categories = [...new Set(allPosts.map(p => p.category).filter(Boolean))];
        showModal(`
          <span class="close-modal" onclick="closeModal()">&times;</span>
          <h3 style="margin-bottom:20px; font-weight:800;">Browse Categories</h3>
          <div style="display:flex; flex-direction:column; gap:12px;">
            ${categories.map(cat => `<button onclick="filterByCategory('${cat}')">${cat}</button>`).join("")}
          </div>
        `);
      } else if (type === "genre") {
        const allGenres = allPosts.flatMap(p => parseGenres(p.genres));
        const uniqueGenres = [...new Set(allGenres)];
        showModal(`
          <span class="close-modal" onclick="closeModal()">&times;</span>
          <h3 style="margin-bottom:20px; font-weight:800;">Browse Genres</h3>
          <div style="display:flex; flex-direction:column; gap:12px; max-height:280px; overflow-y:auto; padding-right:8px;">
            ${uniqueGenres.map(g => `<button onclick="filterByGenre('${g}')">${g}</button>`).join("")}
          </div>
        `);
      } else if (type === "az") {
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789".split("");
        showModal(`
          <span class="close-modal" onclick="closeModal()">&times;</span>
          <h3 style="margin-bottom:20px; font-weight:800;">A-Z Alphabet Directory</h3>
          <div style="display:grid; grid-template-columns: repeat(6, 1fr); gap:10px;">
            ${letters.map(l => `<button style="width:100%; margin:0; padding:12px 0;" onclick="filterByLetter('${l}')">${l}</button>`).join("")}
          </div>
        `);
      }
    }

    function filterByCategory(cat) {
      closeModal();
      document.getElementById("gridTitle").innerText = cat;
      renderPosts(allPosts.filter(p => p.category === cat));
    }

    function filterByGenre(genre) {
      closeModal();
      document.getElementById("gridTitle").innerText = "Genre: " + genre;
      renderPosts(allPosts.filter(p => parseGenres(p.genres).some(g => g.toLowerCase() === genre.toLowerCase())));
    }

    function filterByLetter(letter) {
      closeModal();
      document.getElementById("gridTitle").innerText = "Filter: " + letter;
      renderPosts(allPosts.filter(p => p.name.toUpperCase().startsWith(letter)));
    }

    function showAllPosts() {
      toggleSidebar();
      showHome();
    }

    window.onload = loadApp;
  </script>
</body>
</html>
